<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif KR',serif;background:#fff;padding:20px;max-width:900px;margin:0 auto}
.fbtn{cursor:pointer;border:1px solid #ccc;background:transparent;color:#555;padding:5px 18px;border-radius:100px;font-size:13px;transition:all .15s;font-family:'Noto Serif KR',serif}
.fbtn.on{background:#222;color:#fff;border-color:transparent}
.pc{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;transition:border-color .2s}
.pc img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.badge{font-size:10px;padding:2px 9px;border-radius:100px;font-weight:500;color:white;position:absolute;top:10px;left:10px}
.tag{font-size:10px;padding:2px 8px;border-radius:100px;background:#f0f0f0;color:#666;border:1px solid #e0e0e0}
.sc{background:#fff;border:1px solid #e5e5e5;border-left-width:3px;border-radius:0 12px 12px 0;padding:.9rem 1.1rem;display:flex;gap:12px;align-items:flex-start}
.dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:2px}
</style></head><body>

<div style="text-align:center;padding:2rem 0 1.5rem">
  <p style="font-size:11px;letter-spacing:.25em;color:#999;margin-bottom:5px">handmade collection</p>
  <h1 style="font-size:22px;font-weight:500;color:#222;margin-bottom:4px">원석 팔찌 컬렉션</h1>
  <p style="font-size:13px;color:#aaa;font-style:italic;margin-bottom:1.5rem">only for you</p>
  <div id="fb" style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
    <button class="fbtn on" data-c="전체">전체</button>
    <button class="fbtn" data-c="헤마타이트">헤마타이트</button>
    <button class="fbtn" data-c="아쿠아마린">아쿠아마린</button>
    <button class="fbtn" data-c="흑요석">흑요석</button>
  </div>
</div>

<div id="pg" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:2.5rem"></div>

<div style="border-top:1px solid #e5e5e5;padding-top:2rem;margin-bottom:2rem">
  <div style="text-align:center;margin-bottom:1rem">
    <p style="font-size:11px;letter-spacing:.2em;color:#aaa;margin-bottom:4px">gemstone guide</p>
    <h2 style="font-size:18px;font-weight:500;color:#222">원석의 종류와 의미</h2>
  </div>
  <p style="font-size:12px;color:#aaa;text-align:center;margin-bottom:1.5rem;letter-spacing:.05em">헤마타이트 4가지 · 원석 6가지</p>
  <div style="margin-bottom:1.2rem">
    <p style="font-size:11px;font-weight:500;color:#888;letter-spacing:.15em;margin-bottom:.75rem">— 헤마타이트 4가지</p>
    <div id="sg1" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-bottom:1.5rem"></div>
  </div>
  <div>
    <p style="font-size:11px;font-weight:500;color:#888;letter-spacing:.15em;margin-bottom:.75rem">— 원석 6가지</p>
    <div id="sg2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px"></div>
  </div>

</div>

function render(cat){
  const list=cat==="전체"?P:P.filter(p=>p.cat===cat);
  document.getElementById("pg").innerHTML=list.map(p=>`
    <div class="pc">
      <div style="position:relative">
        <img src="${IMGS[p.id]}" alt="${p.ko}" loading="lazy">
        <span class="badge" style="background:${BCOL[p.cat]}">${p.cat}</span>
      </div>
      <div style="padding:12px 13px 14px">
        <div style="font-size:15px;font-weight:500;color:#222;margin-bottom:2px;font-family:'Noto Serif KR',serif">${p.ko}</div>
        <div style="font-size:11px;color:#aaa;font-style:italic;margin-bottom:7px">${p.en}</div>
        <div style="font-size:11px;font-weight:500;letter-spacing:.06em;margin-bottom:7px;color:${MCOL[p.cat]}">${p.tl}</div>
        <p style="font-size:12px;color:#555;line-height:1.7;margin-bottom:10px">${p.desc}</p>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      </div>
    </div>
  `).join("");
}

function renderStones(arr,id){
  document.getElementById(id).innerHTML=arr.map(s=>`
    <div class="sc" style="border-left-color:${s.border?"#C8BFB8":s.c}">
      <div class="dot" style="background:${s.c};${s.border?"border:1px solid #C8BFB8":""}"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:2px">
          <span style="font-size:14px;font-weight:500;color:#222;font-family:'Noto Serif KR',serif">${s.ko}</span>
          ${s.isNew?'<span style="font-size:10px;padding:2px 8px;border-radius:100px;background:#E6F1FB;color:#185FA5;font-weight:500">NEW ✦</span>':""}
          <span style="font-size:10px;padding:2px 7px;border-radius:100px;background:#f5f5f5;color:#888;border:1px solid #e5e5e5;margin-left:2px">${s.en}</span>
        </div>
        <div style="font-size:12px;font-weight:500;color:#555;letter-spacing:.04em;margin-bottom:4px">${s.meaning}</div>
        <p style="font-size:12px;color:#666;line-height:1.7">${s.desc}</p>
      </div>
    </div>
  `).join("");
}

document.getElementById("fb").addEventListener("click",e=>{
  const b=e.target.closest(".fbtn");
  if(!b)return;
  document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  render(b.dataset.c);
});

render("전체");
renderStones(SG1,"sg1");
renderStones(SG2,"sg2");
